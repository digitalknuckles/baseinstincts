<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Naïveté © : Base Instincts</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="https://unpkg.com/web3modal@1.9.12/dist/index.js"></script>
<script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
:root {
  --accent:#ff6ad5;
}

/* ===== BASE ===== */
body { margin:0; background:#000; color:#fff; overflow-x:hidden; font-family:Inter; }

/* ===== BACKGROUND ===== */
.bg {
  position:fixed; inset:0;
  background:url('image.png') center/cover no-repeat;
}
.bg::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.2),rgba(0,0,0,.7));
}

/* ===== HEADER ===== */
.header {
  display:flex; justify-content:space-between;
  padding:14px 6vw; position:relative; z-index:2;
}
.connect-btn {
  background:linear-gradient(90deg,#ff6ad5,#ffd36a);
  padding:8px 12px;
  border-radius:999px;
  border:none;
  color:#000;
  cursor:pointer;
}

/* 🔥 blinking */
.blink {
  animation:blink 1s infinite;
}
@keyframes blink {
  0%,100%{opacity:1}
  50%{opacity:.3}
}

/* ===== SCROLL GALLERY ===== */
.stage { height:240vh; }
.sticky { position:sticky; top:12vh; height:76vh; display:flex; align-items:center; }
.track { display:flex; gap:6vw; padding:0 6vw; }

.card {
  width:60vw; height:40vw;
  border-radius:18px;
  overflow:hidden;
  background-size:cover;
  position:relative;
}
.card::after {
  content:''; position:absolute; inset:0;
  background:rgba(0,0,0,.35);
}
.card-content {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  justify-content:flex-end;
  padding:20px;
}
.card button {
  background:linear-gradient(90deg,#ff6ad5,#ffd36a);
  border:none; padding:8px 14px;
  border-radius:999px; color:#000;
}

/* ===== NFT OVERLAY ===== */
#nftOverlay {
  position:fixed; inset:0; display:none;
  background:rgba(0,0,0,.9);
  justify-content:center; align-items:center;
  z-index:9999;
}
#overlayBox { width:400px; max-width:90%; text-align:center; }
#overlayImageWrap { position:relative; }
#overlayImageWrap img { width:100%; border-radius:20px; }

#hud {
  position:absolute; inset:0;
  background:url('https://ipfs.io/ipfs/bafybeiasnk6fhvqxc4eqnytyp42wsayqe477v7nlz6gipkmnf5ts2kel2q') center/cover;
  pointer-events:none;
}

#carousel { display:flex; gap:10px; overflow-x:auto; margin-top:10px; }
#carousel img { width:60px; border-radius:10px; opacity:.5; cursor:pointer; }
#carousel img.active { opacity:1; border:2px solid white; }

#saveBtn {
  margin-top:10px;
  background:linear-gradient(90deg,#ff6ad5,#ffd36a);
  padding:8px 12px;
  border-radius:999px;
  color:#000;
  cursor:pointer;
}

/* ===== FLASH ===== */
#flash {
  position:fixed; inset:0;
  background:white;
  opacity:0;
  z-index:10000;
}
.flash { animation:flash .4s; }
@keyframes flash { 0%{opacity:1}100%{opacity:0} }

/* ===== SPLASH ===== */
#splash {
  position:fixed; inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.9);
  z-index:9998;
  text-align:center;
}
#splash img { width:300px; border-radius:20px; }
#splashText { font-size:24px; margin-top:20px; }

/* confetti */
.confetti {
  position:fixed;
  width:6px; height:6px;
  background:yellow;
  top:-10px;
  animation:fall 2s linear forwards;
}
@keyframes fall {
  to { transform:translateY(100vh) rotate(360deg); }
}
</style>
</head>

<body>

<div class="bg"></div>

<header class="header">
  <div>Naïveté: Base Instincts</div>
  <div class="flex gap-2">
    <button id="connect" class="connect-btn blink">Connect Wallet</button>
    <button id="photo" class="connect-btn" disabled>Take Class Photo</button>
    <button id="rule" class="connect-btn">Rulebook</button>
  </div>
</header>

<main>
<section class="stage">
<div class="sticky">
<div class="track" id="track">

<div class="card" style="background-image:url('card1.png')">
  <div class="card-content">
    <h3>NFT Collection</h3>
    <button onclick="window.open('https://opensea.io/collection/naivete')">View</button>
  </div>
</div>

<div class="card" style="background-image:url('card2.png')">
  <div class="card-content">
    <h3>Card Game</h3>
    <button onclick="window.open('https://www.thegamecrafter.com/games/na%C3%AFvet%C3%A9:-base-instincts')">Play</button>
  </div>
</div>

<div class="card" style="background-image:url('card3.png')">
  <div class="card-content">
    <h3>Gallery</h3>
    <button onclick="window.open('https://www.spatial.io')">Enter</button>
  </div>
</div>

</div>
</div>
</section>
</main>

<!-- SPLASH -->
<div id="splash">
  <div>
    <img src="https://ipfs.io/ipfs/bafybeibq4ndpj2w2sbuf6xl2t5zfggzeyshqwjvcwwrhetqvxzhxpf6pbi">
    <div id="splashText"></div>
  </div>
</div>

<!-- NFT -->
<div id="nftOverlay">
  <div id="overlayBox">
    <div id="overlayImageWrap">
      <img id="mainNFT">
      <div id="hud"></div>
    </div>
    <div id="carousel"></div>
    <div id="saveBtn">📸 Save Class Photo</div>
  </div>
</div>

<div id="flash"></div>

<script type="module" src="rulebook.js"></script>

<script type="module">
let userAddress=null,nfts=[],selected=0;

// RULEBOOK
document.getElementById("rule").onclick=()=>{
  if(!document.querySelector("naivete-rulebook")){
    document.body.appendChild(document.createElement("naivete-rulebook"));
  }
};

// CONNECT
document.getElementById("connect").onclick=async()=>{
  const modal=new window.Web3Modal.default({});
  const provider=await modal.connect();
  const ethersProvider=new ethers.providers.Web3Provider(provider);
  const signer=ethersProvider.getSigner();
  userAddress=await signer.getAddress();

  const btn=document.getElementById("connect");
  btn.textContent=userAddress.slice(0,6)+"...";
  btn.classList.remove("blink");

  fetchNFTs();
};

// FETCH NFTs
async function fetchNFTs(){
  const res=await fetch(`/api/opensea?address=${userAddress}`);
  const data=await res.json();
  nfts=data.nfts||[];

  showSplash();

  if(!nfts.length) return;

  document.getElementById("photo").disabled=false;
  buildCarousel();
}

// SPLASH
function showSplash(){
  const splash=document.getElementById("splash");
  const text=document.getElementById("splashText");

  splash.style.display="flex";

  if(nfts.length){
    text.innerHTML="WELCOME BESTY 🎉";
    spawnConfetti();
  } else {
    text.innerHTML=`NFT COLLECTION<br><button onclick="window.open('https://opensea.io/collection/naivete')">View</button>`;
  }

  setTimeout(()=>splash.style.display="none",2500);
}

// CONFETTI
function spawnConfetti(){
  for(let i=0;i<40;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=`hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}

// CAROUSEL
function buildCarousel(){
  const el=document.getElementById("carousel");
  el.innerHTML="";
  nfts.forEach((n,i)=>{
    const img=document.createElement("img");
    img.src=n.image;
    if(i===0) img.classList.add("active");
    img.onclick=()=>{
      selected=i;
      updateMain();
      document.querySelectorAll("#carousel img").forEach(x=>x.classList.remove("active"));
      img.classList.add("active");
    };
    el.appendChild(img);
  });
  updateMain();
}
function updateMain(){
  document.getElementById("mainNFT").src=nfts[selected].image;
}

// OVERLAY
const overlay=document.getElementById("nftOverlay");
document.getElementById("photo").onclick=()=>overlay.style.display="flex";
overlay.onclick=e=>{ if(e.target===overlay) overlay.style.display="none"; };

// SAVE
document.getElementById("saveBtn").onclick=async()=>{
  const flash=document.getElementById("flash");
  flash.classList.remove("flash");
  void flash.offsetWidth;
  flash.classList.add("flash");

  await new Promise(r=>setTimeout(r,150));

  const canvas=await html2canvas(document.getElementById("overlayImageWrap"),{backgroundColor:null});
  const link=document.createElement("a");
  link.download="naivete.png";
  link.href=canvas.toDataURL();
  link.click();
};

// SCROLL
const track=document.getElementById("track");
const stage=document.querySelector(".stage");
window.addEventListener("scroll",()=>{
  const y=window.scrollY-stage.offsetTop;
  const max=stage.scrollHeight-window.innerHeight;
  const p=Math.min(Math.max(y/max,0),1);
  track.style.transform=`translateX(-${p*(track.scrollWidth-window.innerWidth)}px)`;
});
</script>

</body>
</html>
