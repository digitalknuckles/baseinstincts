<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#ff6ad5" />
<title>Naïveté © : Base Instincts</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="https://unpkg.com/web3modal@1.9.12/dist/index.js"></script>
<script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>

<style>
/* ==== ORIGINAL STYLES PRESERVED ==== */
:root {
  --bg-overlay: rgba(0,0,0,0.35);
  --accent: #ff6ad5;
  --card-w: 60vw;
  --card-h: 40vw;
  --gutter: 6vw;
  font-family: Inter, system-ui;
}
@media (min-width: 768px) {
  :root {
    --card-w: 40vw;
    --card-h: 26vw;
  }
}

html, body {
  height:100%;
  margin:0;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* background */
.bg {
  position:fixed;
  inset:0;
  background:center/cover no-repeat url('image.png');
}
.bg::after {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,0.2),rgba(0,0,0,0.6));
}

.app { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column }
.header { display:flex; justify-content:space-between; padding:14px 6vw }

.connect-btn {
  background:linear-gradient(90deg,var(--accent),#ffd36a);
  border:none;
  padding:8px 12px;
  border-radius:999px;
  font-weight:600;
  color:#000;
  cursor:pointer;
}

/* gallery */
.stage { height:240vh }
.sticky { position:sticky; top:12vh; height:76vh; display:flex; align-items:center }
.track {
  display:flex;
  gap:var(--gutter);
  padding:0 6vw;
  overflow-x:auto;
}
.track::-webkit-scrollbar { display:none; }

.card {
  width:var(--card-w);
  height:var(--card-h);
  flex:0 0 auto;
  border-radius:18px;
  overflow:hidden;
  background-size:cover;
  position:relative;
}
.card::after {
  content:''; position:absolute; inset:0;
  background:rgba(0,0,0,0.3);
}

/* ==== OVERLAY ==== */
#nftOverlay {
  position:fixed; inset:0; display:none;
  justify-content:center; align-items:center;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(6px);
  z-index:9999;
}

#overlayBox {
  width:400px;
  max-width:90%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

#overlayImageWrap {
  position:relative;
  width:100%;
}

#overlayImageWrap img {
  width:100%;
  border-radius:20px;
}

#hud {
  position:absolute; inset:0;
  background:url('https://ipfs.io/ipfs/bafybeifmgmf2iec3htvgt3lqy6fghf5zfe76ews3invh2a4qclnbondwsq') center/cover no-repeat;
  pointer-events:none;
  border-radius:20px;
}

#carousel {
  display:flex;
  overflow-x:auto;
  gap:10px;
}

#carousel img {
  width:60px;
  height:60px;
  border-radius:10px;
  opacity:0.6;
  cursor:pointer;
}
#carousel img.active {
  opacity:1;
  border:2px solid white;
}

/* save button */
#saveBtn {
  background:linear-gradient(90deg,#ff6ad5,#ffd36a);
  color:#000;
  padding:8px 14px;
  border-radius:999px;
  cursor:pointer;
}

/* flash */
#flash {
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
  z-index:10000;
}
.flash-active {
  animation:flashAnim 0.4s ease;
}
@keyframes flashAnim {
  0% { opacity:1; }
  100% { opacity:0; }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="app">
<header class="header">
  <div>Naïveté: Base Instincts</div>
  <div class="flex gap-2">
    <button id="connect" class="connect-btn">Connect Wallet</button>
    <button id="photo" class="connect-btn" disabled>Take Class Photo</button>
    <button id="show-rulebook" class="connect-btn">Rulebook</button>
  </div>
</header>

<main>
<section class="stage">
<div class="sticky">
<div class="track" id="track">

<div class="card" style="background-image:url('card1.png')"></div>
<div class="card" style="background-image:url('card2.png')"></div>
<div class="card" style="background-image:url('card3.png')"></div>

</div>
</div>
</section>
</main>
</div>

<div id="flash"></div>

<!-- OVERLAY -->
<div id="nftOverlay">
  <div id="overlayBox">
    <div id="overlayImageWrap">
      <img id="mainNFT" src="" />
      <div id="hud"></div>
    </div>
    <div id="carousel"></div>
    <div id="saveBtn">📸 Save Class Photo</div>
  </div>
</div>

<script type="module">
let userAddress=null;
let nfts=[];
let selected=0;

// RULEBOOK
document.getElementById("show-rulebook").onclick=()=>{
  document.body.appendChild(document.createElement("naivete-rulebook"));
};

// WALLET CONNECT + AUTO VERIFY
document.getElementById("connect").onclick=async()=>{
  const web3Modal=new window.Web3Modal.default({
    providerOptions:{
      walletconnect:{
        package:window.WalletConnectProvider.default,
        options:{infuraId:"YOUR_INFURA_ID"}
      }
    }
  });

  const provider=await web3Modal.connect();
  const ethersProvider=new ethers.providers.Web3Provider(provider);
  const signer=ethersProvider.getSigner();

  userAddress=await signer.getAddress();
  document.getElementById("connect").textContent=userAddress.slice(0,6)+"...";

  fetchNFTs();
};

async function fetchNFTs(){
  const res=await fetch(`/api/opensea?address=${userAddress}`);
  const data=await res.json();

  nfts=data.nfts||[];

  if(!nfts.length){
    if(confirm("No NFTs found. View on OpenSea?")){
      window.open("https://opensea.io/collection/naivete","_blank");
    }
    return;
  }

  document.getElementById("photo").disabled=false;
  buildCarousel();
}

function buildCarousel(){
  const el=document.getElementById("carousel");
  el.innerHTML="";

  nfts.forEach((n,i)=>{
    const img=document.createElement("img");
    img.src=n.image;

    if(i===0) img.classList.add("active");

    img.onclick=()=>{
      selected=i;
      updateMain();
      document.querySelectorAll("#carousel img").forEach(x=>x.classList.remove("active"));
      img.classList.add("active");
    };

    el.appendChild(img);
  });

  updateMain();
}

function updateMain(){
  document.getElementById("mainNFT").src=nfts[selected].image;
}

// overlay
const overlay=document.getElementById("nftOverlay");
document.getElementById("photo").onclick=()=>overlay.style.display="flex";
overlay.onclick=e=>{ if(e.target===overlay) overlay.style.display="none"; };

// flash
document.getElementById("saveBtn").onclick=()=>{
  const flash=document.getElementById("flash");
  flash.classList.remove("flash-active");
  void flash.offsetWidth;
  flash.classList.add("flash-active");
};

// scroll effect
const track=document.getElementById("track");
const stage=document.querySelector(".stage");

window.addEventListener("scroll",()=>{
  const scrollY=window.scrollY-stage.offsetTop;
  const maxScroll=stage.scrollHeight-window.innerHeight;
  const percent=Math.min(Math.max(scrollY/maxScroll,0),1);
  const maxTranslate=track.scrollWidth-window.innerWidth;
  track.style.transform=`translateX(-${percent*maxTranslate}px)`;
});
</script>

</body>
</html>
