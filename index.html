<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#ff6ad5" />
<title>Naïveté © : Base Instincts</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="https://unpkg.com/web3modal@1.9.12/dist/index.js"></script>
<script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
/* ===== ORIGINAL STYLES ===== */
:root {
  --bg-overlay: rgba(0,0,0,0.35);
  --accent: #ff6ad5;
  --card-w: 60vw;
  --card-h: 40vw;
  --gutter: 6vw;
  font-family: Inter, system-ui;
}
@media (min-width: 768px) {
  :root {
    --card-w: 40vw;
    --card-h: 26vw;
  }
}

html, body {
  height:100%;
  margin:0;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* background */
.bg {
  position:fixed;
  inset:0;
  background:center/cover no-repeat url('image.png');
}
.bg::after {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,0.2),rgba(0,0,0,0.6));
}

/* layout */
.app { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column }
.header { display:flex; align-items:center; justify-content:space-between; padding:14px 6vw }
.connect-btn {
  background:linear-gradient(90deg,var(--accent),#ffd36a);
  border:none;
  padding:8px 12px;
  border-radius:999px;
  font-weight:600;
  color:#000;
  cursor:pointer;
}

/* gallery */
.stage { height:240vh }
.sticky { position:sticky; top:12vh; height:76vh; display:flex; align-items:center }
.track {
  display:flex;
  gap:var(--gutter);
  padding:0 6vw;
  overflow-x:auto;
}
.track::-webkit-scrollbar { display:none; }

/* cards */
.card {
  width:var(--card-w);
  height:var(--card-h);
  flex:0 0 auto;
  position:relative;
  border-radius:18px;
  overflow:hidden;
  background-size:cover;
  background-position:center;
}
.card::after {
  content:'';
  position:absolute;
  inset:0;
  background:var(--bg-overlay);
}
.card-content {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:20px;
  z-index:2;
}
.card h3 {
  font-size:20px;
  font-weight:700;
  margin-bottom:10px;
  background:linear-gradient(90deg,#ff6ad5,#ffd36a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.card button {
  background:linear-gradient(90deg,var(--accent),#ffd36a);
  color:#000;
  border:none;
  padding:8px 16px;
  border-radius:999px;
  font-weight:600;
  cursor:pointer;
}

/* ===== OVERLAY ===== */
#overlayRow {
  display:flex;
  gap:14px;
  width:100%;
  align-items:flex-start;
}

#metaBox {
  min-width:140px;
  max-width:160px;
  font-size:12px;
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:12px;
  backdrop-filter:blur(6px);
}

#metaName {
  font-weight:700;
  margin-bottom:6px;
  font-size:13px;
}

#metaTraits {
  display:flex;
  flex-direction:column;
  gap:4px;
  opacity:0.9;
}

.metaRow {
  display:flex;
  justify-content:space-between;
  gap:6px;
}

.metaKey {
  opacity:0.6;
}

.metaVal {
  font-weight:600;
}

/* MOBILE STACK */
@media (max-width: 640px){
  #overlayRow {
    flex-direction:column;
    align-items:center;
  }
  #metaBox {
    width:100%;
    max-width:none;
  }
}
  
#nftOverlay {
  position:fixed; inset:0; display:none;
  justify-content:center; align-items:center;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(6px);
  z-index:9999;
}

#overlayBox {
  width:400px;
  max-width:90%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

#overlayImageWrap {
  position:relative;
  width:100%;
}

#overlayImageWrap img {
  width:100%;
  border-radius:20px;
}

#hud {
  position:absolute;
  inset:0;
  background:url('https://ipfs.io/ipfs/bafybeiasnk6fhvqxc4eqnytyp42wsayqe477v7nlz6gipkmnf5ts2kel2q') center/cover no-repeat;
  pointer-events:none;
  border-radius:20px;
}

#carousel {
  display:flex;
  overflow-x:auto;
  gap:10px;
}
#carousel img {
  width:60px;
  height:60px;
  border-radius:10px;
  opacity:0.6;
  cursor:pointer;
}
#carousel img.active {
  opacity:1;
  border:2px solid white;
}

#saveBtn {
  background:linear-gradient(90deg,#ff6ad5,#ffd36a);
  color:#000;
  padding:8px 14px;
  border-radius:999px;
  cursor:pointer;
}

/* flash */
#flash {
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
  z-index:10000;
}
.flash-active {
  animation:flashAnim 0.4s ease;
}
@keyframes flashAnim {
  0% { opacity:1; }
  100% { opacity:0; }
}

  /* ===== STATS PANEL ===== */
#statsPanel {
  width:100%;
  background:rgba(0,0,0,0.6);
  border-radius:14px;
  padding:10px;
  font-size:12px;
}

.stat {
  margin-bottom:8px;
}

.stat-label {
  display:flex;
  justify-content:space-between;
  margin-bottom:2px;
  font-size:11px;
  opacity:0.8;
}

.stat-bar {
  width:100%;
  height:8px;
  background:rgba(255,255,255,0.1);
  border-radius:999px;
  overflow:hidden;
}

.stat-fill {
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#ff6ad5,#ffd36a);
  width:0%;
  transition:width 0.6s ease;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="app">
<header class="header">
  <div>Naïveté: Base Instincts</div>
  <div class="flex gap-2">
    <button id="connect" class="connect-btn">Connect Wallet</button>
    <button id="photo" class="connect-btn" disabled>Take Class Photo</button>
    <button id="show-rulebook" class="connect-btn">Rulebook</button>
  </div>
</header>

<main>
<section class="stage">
<div class="sticky">
<div class="track" id="track">

<!-- NFT Collection -->
<div class="card" style="background-image:url('card1.png')">
  <div class="card-content">
    <h3>NFT Collection</h3>
    <button onclick="window.open('https://opensea.io/collection/naivete','_blank')">View on OpenSea</button>
  </div>
</div>

<!-- Game -->
<div class="card" style="background-image:url('card2.png')">
  <div class="card-content">
    <h3>Card Game</h3>
    <button onclick="window.open('https://www.thegamecrafter.com/games/na%C3%AFvet%C3%A9:-base-instincts','_blank')">Play & Buy</button>
  </div>
</div>

<!-- Gallery -->
<div class="card" style="background-image:url('card3.png')">
  <div class="card-content">
    <h3>Virtual Gallery</h3>
    <button onclick="window.open('https://www.spatial.io/s/Naivete-Base-Instincts-68f01f9a884893267eca2a70?share=2043180943931599241','_blank')">Enter Gallery</button>
  </div>
</div>

</div>
</div>
</section>
</main>
</div>

<div id="flash"></div>

<!-- OVERLAY -->
<div id="nftOverlay">
  <div id="overlayBox">

    <!-- FLEX WRAP FOR IMAGE + METADATA -->
    <div id="overlayRow">
      
      <div id="overlayImageWrap">
        <img id="mainNFT" src="" />
        <div id="hud"></div>
      </div>

      <!-- 🧠 METADATA PANEL -->
<div id="overlayBox">
  <div id="overlayImageWrap">
    <img id="mainNFT" src="" />
    <div id="hud"></div>
  </div>

  <!-- 🔥 NEW STATS PANEL -->
  <div id="statsPanel"></div>

  <div id="carousel"></div>
  <div id="saveBtn">📸 Save Class Photo</div>
</div>

  
<script type="module" src="rulebook.js"></script>
  
<script type="module">
let userAddress=null;
let nfts=[];
let selected=0;

// rulebook
document.getElementById("show-rulebook").onclick = () => {
  document.body.appendChild(document.createElement("naivete-rulebook"));
};

// connect + auto verify
document.getElementById("connect").onclick=async()=>{
  const web3Modal=new window.Web3Modal.default({
    providerOptions:{
      walletconnect:{
        package:window.WalletConnectProvider.default,
        options:{infuraId:"YOUR_INFURA_ID"}
      }
    }
  });

  const provider=await web3Modal.connect();
  const ethersProvider=new ethers.providers.Web3Provider(provider);
  const signer=ethersProvider.getSigner();

  userAddress=await signer.getAddress();
  document.getElementById("connect").textContent=userAddress.slice(0,6)+"...";

  fetchNFTs();
};

async function fetchNFTs(){
  const res=await fetch(`/api/opensea?address=${userAddress}`);
  const data=await res.json();

  nfts=data.nfts||[];

  if(!nfts.length){
    if(confirm("No NFTs found. View on OpenSea?")){
      window.open("https://opensea.io/collection/naivete","_blank");
    }
    return;
  }

  document.getElementById("photo").disabled=false;
  buildCarousel();
}

function buildCarousel(){
  const el=document.getElementById("carousel");
  el.innerHTML="";

  nfts.forEach((n,i)=>{
    const img=document.createElement("img");
    img.src=n.image;

    if(i===0) img.classList.add("active");

    img.onclick=()=>{
      selected=i;
      updateMain();
      document.querySelectorAll("#carousel img").forEach(x=>x.classList.remove("active"));
      img.classList.add("active");
    };

    el.appendChild(img);
  });

  updateMain();
}

function updateMain(){
  const nft = nfts[selected];

  document.getElementById("mainNFT").src = nft.image;

  const statsEl = document.getElementById("statsPanel");

  if (!nft.attributes) {
    statsEl.innerHTML = "<div>No stats available</div>";
    return;
  }

  const getAttr = (type) => {
    return nft.attributes.find(a => 
      a.trait_type.toLowerCase() === type.toLowerCase()
    )?.value;
  };

  const hp = parseInt(getAttr("HP")) || 0;
  const power = parseInt(getAttr("power level")) || 0;

  statsEl.innerHTML = `
    <div class="stat">
      <div class="stat-label">
        <span>HP</span>
        <span>${hp}</span>
      </div>
      <div class="stat-bar">
        <div class="stat-fill" id="hpBar"></div>
      </div>
    </div>

    <div class="stat">
      <div class="stat-label">
        <span>Power</span>
        <span>${power}</span>
      </div>
      <div class="stat-bar">
        <div class="stat-fill" id="powerBar"></div>
      </div>
    </div>
  `;

  // animate bars
  setTimeout(() => {
    document.getElementById("hpBar").style.width = Math.min(hp, 150) + "%";
    document.getElementById("powerBar").style.width = Math.min(power, 150) + "%";
  }, 50);
}

  console.log("NFT SAMPLE:", nfts[0]);

// overlay
const overlay=document.getElementById("nftOverlay");
document.getElementById("photo").onclick=()=>overlay.style.display="flex";
overlay.onclick=e=>{ if(e.target===overlay) overlay.style.display="none"; };

// save + flash + export
document.getElementById("saveBtn").onclick=async()=>{
  const flash=document.getElementById("flash");
  flash.classList.remove("flash-active");
  void flash.offsetWidth;
  flash.classList.add("flash-active");

  await new Promise(r=>setTimeout(r,150));

  const canvas=await html2canvas(document.getElementById("overlayImageWrap"),{
    backgroundColor:null,
    useCORS:true,
    scale:2
  });

  const link=document.createElement("a");
  link.download="naivete-class-photo.png";
  link.href=canvas.toDataURL();
  link.click();
};

// scroll effect
const track=document.getElementById("track");
const stage=document.querySelector(".stage");

window.addEventListener("scroll",()=>{
  const scrollY=window.scrollY-stage.offsetTop;
  const maxScroll=stage.scrollHeight-window.innerHeight;
  const percent=Math.min(Math.max(scrollY/maxScroll,0),1);
  const maxTranslate=track.scrollWidth-window.innerWidth;
  track.style.transform=`translateX(-${percent*maxTranslate}px)`;
});
</script>

</body>
</html>
