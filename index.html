<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Naïveté © : Base Instincts</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="https://unpkg.com/web3modal@1.9.12/dist/index.js"></script>
<script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
:root {
  --accent:#ff6ad5;
  --card-w:60vw;
  --card-h:40vw;
}
@media (min-width:768px){
  :root { --card-w:40vw; --card-h:26vw; }
}

body { margin:0; background:#000; color:#fff; overflow-x:hidden; font-family:Inter; }

/* background */
.bg { position:fixed; inset:0; background:url('image.png') center/cover; }
.bg::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,.2),rgba(0,0,0,.6)); }

/* header */
.header { display:flex; justify-content:space-between; padding:14px 6vw; }
.connect-btn {
  background:linear-gradient(90deg,#ff6ad5,#ffd36a);
  padding:8px 12px;
  border-radius:999px;
  color:#000;
  cursor:pointer;
}

/* blinking */
.blink { animation:blink 1s infinite; }
@keyframes blink { 50%{opacity:.3} }

/* loading */
.loading { opacity:.6; pointer-events:none; }

/* scroll */
.stage { height:240vh; }
.sticky { position:sticky; top:12vh; height:76vh; display:flex; align-items:center; }
.track { display:flex; gap:6vw; padding:0 6vw; }

/* cards */
.card {
  width:var(--card-w);
  height:var(--card-h);
  border-radius:18px;
  overflow:hidden;
  position:relative;
  background-size:cover;
}
.card::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,.35); }
.card-content {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  justify-content:flex-end;
  padding:20px;
}

/* overlay */
#nftOverlay {
  position:fixed; inset:0; display:none;
  justify-content:center; align-items:center;
  background:rgba(0,0,0,.9);
  z-index:9999;
}
#overlayBox { width:400px; max-width:90%; text-align:center; }
#overlayImageWrap { position:relative; }
#overlayImageWrap img { width:100%; border-radius:20px; }
#hud {
  position:absolute; inset:0;
  background:url('https://ipfs.io/ipfs/bafybeifmgmf2iec3htvgt3lqy6fghf5zfe76ews3invh2a4qclnbondwsq') center/cover;
}
#carousel { display:flex; gap:10px; overflow-x:auto; margin-top:10px; }
#carousel img { width:60px; border-radius:10px; opacity:.5; cursor:pointer; }
#carousel img.active { opacity:1; border:2px solid #fff; }

#saveBtn {
  margin-top:10px;
  background:linear-gradient(90deg,#ff6ad5,#ffd36a);
  padding:8px;
  border-radius:999px;
  color:#000;
}

/* splash */
#splash {
  position:fixed; inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.95);
  z-index:9998;
  flex-direction:column;
  text-align:center;
  animation:fadeIn .4s ease;
}
#splash.fade-out { animation:fadeOut .4s forwards; }

@keyframes fadeIn { from{opacity:0; transform:scale(.95)} }
@keyframes fadeOut { to{opacity:0; transform:scale(1.05)} }

</style>
</head>

<body>

<div class="bg"></div>

<header class="header">
  <div>Naïveté: Base Instincts</div>
  <div class="flex gap-2">
    <button id="connect" class="connect-btn blink">Connect Wallet</button>
    <button id="photo" class="connect-btn" disabled>Take Class Photo</button>
  </div>
</header>

<main>
<section class="stage">
<div class="sticky">
<div class="track" id="track">

<div class="card" style="background-image:url('card1.png')">
  <div class="card-content">
    <h3>NFT Collection</h3>
    <button onclick="window.open('https://opensea.io/collection/naivete')">View</button>
  </div>
</div>

<div class="card" style="background-image:url('card2.png')">
  <div class="card-content">
    <h3>Card Game</h3>
    <button onclick="window.open('https://www.thegamecrafter.com')">Play</button>
  </div>
</div>

<div class="card" style="background-image:url('card3.png')">
  <div class="card-content">
    <h3>Gallery</h3>
    <button onclick="window.open('https://www.spatial.io')">Enter</button>
  </div>
</div>

</div>
</div>
</section>
</main>

<!-- splash -->
<div id="splash">
  <img src="https://ipfs.io/ipfs/bafybeibq4ndpj2w2sbuf6xl2t5zfggzeyshqwjvcwwrhetqvxzhxpf6pbi" style="width:280px;border-radius:16px;">
  <div id="splashText" style="margin-top:16px;font-size:22px;"></div>
</div>

<!-- overlay -->
<div id="nftOverlay">
  <div id="overlayBox">
    <div id="overlayImageWrap">
      <img id="mainNFT">
      <div id="hud"></div>
    </div>
    <div id="carousel"></div>
    <div id="saveBtn">📸 Save Class Photo</div>
  </div>
</div>

<script>
let userAddress=null,nfts=[],selected=0;

const providerOptions={
  walletconnect:{
    package:window.WalletConnectProvider.default,
    options:{infuraId:"YOUR_INFURA_ID"}
  }
};

const web3Modal=new window.Web3Modal.default({
  cacheProvider:true,
  providerOptions
});

/* AUTO RECONNECT */
window.addEventListener("load",()=>{
  if(web3Modal.cachedProvider){
    connectWallet(true);
  }
});

/* CONNECT */
document.getElementById("connect").onclick=()=>connectWallet(false);

async function connectWallet(isAuto){
  try{
    const provider=await web3Modal.connect();
    const ethersProvider=new ethers.providers.Web3Provider(provider);
    const signer=ethersProvider.getSigner();
    userAddress=await signer.getAddress();

    const btn=document.getElementById("connect");
    btn.textContent=userAddress.slice(0,6)+"...";
    btn.classList.remove("blink");

    fetchNFTs();
  }catch(e){
    if(!isAuto) alert("Connection failed");
  }
}

/* FETCH */
async function fetchNFTs(){
  const btn=document.getElementById("connect");
  btn.textContent="Verifying...";
  btn.classList.add("loading");

  const res=await fetch(`/api/opensea?address=${userAddress}`);
  const data=await res.json();

  nfts=data.nfts||[];

  btn.classList.remove("loading");

  showSplash();
}

/* SPLASH */
function showSplash(){
  const splash=document.getElementById("splash");
  const text=document.getElementById("splashText");

  splash.style.display="flex";

  if(nfts.length){
    text.innerHTML="WELCOME BESTY 🎉";
    document.getElementById("photo").disabled=false;
    buildCarousel();
  } else {
    text.innerHTML=`No NFT Found<br><button onclick="window.open('https://opensea.io/collection/naivete')">View Collection</button>`;
  }

  setTimeout(()=>{
    splash.classList.add("fade-out");
    setTimeout(()=>{
      splash.style.display="none";
      splash.classList.remove("fade-out");
    },400);
  },2200);
}

/* CAROUSEL */
function buildCarousel(){
  const el=document.getElementById("carousel");
  el.innerHTML="";
  nfts.forEach((n,i)=>{
    const img=document.createElement("img");
    img.src=n.image;
    if(i===0) img.classList.add("active");
    img.onclick=()=>{
      selected=i;
      updateMain();
      document.querySelectorAll("#carousel img").forEach(x=>x.classList.remove("active"));
      img.classList.add("active");
    };
    el.appendChild(img);
  });
  updateMain();
}
function updateMain(){
  document.getElementById("mainNFT").src=nfts[selected].image;
}

/* OVERLAY */
const overlay=document.getElementById("nftOverlay");
document.getElementById("photo").onclick=()=>overlay.style.display="flex";
overlay.onclick=e=>{ if(e.target===overlay) overlay.style.display="none"; };

/* SAVE */
document.getElementById("saveBtn").onclick=async()=>{
  const canvas=await html2canvas(document.getElementById("overlayImageWrap"),{backgroundColor:null});
  const link=document.createElement("a");
  link.download="naivete.png";
  link.href=canvas.toDataURL();
  link.click();
};

/* SCROLL */
const track=document.getElementById("track");
const stage=document.querySelector(".stage");
window.addEventListener("scroll",()=>{
  const y=window.scrollY-stage.offsetTop;
  const max=stage.scrollHeight-window.innerHeight;
  const p=Math.min(Math.max(y/max,0),1);
  track.style.transform=`translateX(-${p*(track.scrollWidth-window.innerWidth)}px)`;
});
</script>

</body>
</html>
