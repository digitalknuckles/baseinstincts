<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Naïveté © : Base Instincts</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="https://unpkg.com/web3modal@1.9.12/dist/index.js"></script>
<script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
:root{
  --accent:#ff6ad5;
  --card-w:60vw;
  --card-h:40vw;
}

body{margin:0;background:#000;color:#fff;font-family:Inter}

/* background */
.bg{position:fixed;inset:0;background:url('image.png') center/cover}
.bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.2),rgba(0,0,0,.7))}

/* header */
.header{display:flex;justify-content:space-between;padding:14px 6vw}
.connect-btn{
  background:linear-gradient(90deg,#ff6ad5,#ffd36a);
  border:none;padding:8px 12px;border-radius:999px;
  color:#000;font-weight:600;cursor:pointer
}

/* gallery */
.stage{height:240vh}
.sticky{position:sticky;top:12vh;height:76vh;display:flex;align-items:center}
.track{display:flex;gap:6vw;padding:0 6vw}

/* cards */
.card{
  width:var(--card-w);height:var(--card-h);
  border-radius:18px;overflow:hidden;position:relative;
  background-size:cover;background-position:center
}
.card::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.35)}
.card-content{position:absolute;bottom:0;padding:20px}

/* overlay */
#nftOverlay{
  position:fixed;inset:0;display:none;
  background:rgba(0,0,0,.9);
  justify-content:center;align-items:center;
  z-index:9999
}

#overlayBox{
  width:420px;max-width:92vw;
  display:flex;flex-direction:column;gap:12px;
  align-items:center
}

/* capture */
#captureArea{
  width:420px;height:420px;
  position:relative;flex-shrink:0;
}
#captureArea img{
  width:100%;height:100%;
  object-fit:cover;border-radius:20px
}
#hud{
  position:absolute;inset:0;
  background:url('https://ipfs.io/ipfs/bafybeiasnk6fhvqxc4eqnytyp42wsayqe477v7nlz6gipkmnf5ts2kel2q') center/cover;
  pointer-events:none;border-radius:20px
}

/* carousel */
#carousel{display:flex;gap:10px;overflow-x:auto}
#carousel img{
  width:60px;height:60px;border-radius:10px;opacity:.6;cursor:pointer
}
#carousel img.active{opacity:1;border:2px solid white}

/* button */
#saveBtn{
  background:linear-gradient(90deg,#ff6ad5,#ffd36a);
  color:#000;padding:8px 14px;border-radius:999px;cursor:pointer
}

/* dropdown */
#cardToggle{
  width:100%;padding:10px;border:none;
  background:linear-gradient(90deg,#ff6ad5,#ffd36a);
  color:#000;font-weight:600;cursor:pointer;
  display:flex;justify-content:space-between
}

#characterCard{
  max-height:0;overflow:hidden;
  transition:.3s;padding:0 10px;
}
#characterCard.open{
  max-height:500px;padding:10px;
}

/* stat bars */
.stat-bar{height:8px;background:#222;border-radius:999px}
.stat-fill{
  height:100%;
  background:linear-gradient(90deg,#ff6ad5,#ffd36a);
  width:0%;transition:.6s
}
</style>
</head>

<body>

<div class="bg"></div>

<header class="header">
  <div>Naïveté</div>
  <div class="flex gap-2">
    <button id="connect" class="connect-btn">Connect</button>
    <button id="photo" class="connect-btn" disabled>Photo</button>
  </div>
</header>

<section class="stage">
<div class="sticky">
<div class="track" id="track">

<div class="card" style="background-image:url('card1.png')">
<div class="card-content">
<h3>NFT Collection</h3>
<button onclick="window.open('https://opensea.io/collection/naivete')">View</button>
</div></div>

<div class="card" style="background-image:url('card2.png')">
<div class="card-content">
<h3>Game</h3>
<button onclick="window.open('https://thegamecrafter.com')">Play</button>
</div></div>

</div></div></section>

<!-- overlay -->
<div id="nftOverlay">
<div id="overlayBox">

<div id="captureArea">
<img id="mainNFT">
<div id="hud"></div>
</div>

<div id="carousel"></div>
<div id="saveBtn">📸 Save Class Photo</div>

<button id="cardToggle">Character Stats <span id="icon">▼</span></button>
<div id="characterCard"></div>

</div>
</div>

<script>
let provider, signer, address;
let nfts=[], selected=0;

/* CONNECT */
document.getElementById("connect").onclick = async ()=>{
  const web3Modal = new window.Web3Modal.default({
    cacheProvider:true,
    providerOptions:{
      walletconnect:{
        package:window.WalletConnectProvider.default,
        options:{infuraId:"YOUR_INFURA_ID"}
      }
    }
  });

  provider = await web3Modal.connect();

  /* MOBILE FIX */
  if(provider.isWalletConnect){
    provider.enable();
  }

  const ethersProvider = new ethers.providers.Web3Provider(provider);
  signer = ethersProvider.getSigner();
  address = await signer.getAddress();

  localStorage.setItem("wallet","connected");

  document.getElementById("connect").textContent =
    address.slice(0,6)+"...";

  fetchNFTs();
};

/* AUTO RECONNECT */
window.onload = ()=>{
  if(localStorage.getItem("wallet")){
    document.getElementById("connect").click();
  }
};

/* FETCH NFTs */
async function fetchNFTs(){
  const btn = document.getElementById("connect");
  btn.textContent="Loading...";

  const res = await fetch(`/api/opensea?address=${address}`);
  const data = await res.json();

  nfts = data.nfts || [];

  if(!nfts.length){
    alert("No NFTs found");
    return;
  }

  document.getElementById("photo").disabled=false;
  buildCarousel();
}

/* CAROUSEL */
function buildCarousel(){
  const el = document.getElementById("carousel");
  el.innerHTML="";

  nfts.forEach((n,i)=>{
    const img=document.createElement("img");
    img.src=n.image;
    if(i===0) img.classList.add("active");

    img.onclick=()=>{
      selected=i;
      updateMain();
      document.querySelectorAll("#carousel img").forEach(x=>x.classList.remove("active"));
      img.classList.add("active");
    };

    el.appendChild(img);
  });

  updateMain();
}

/* UPDATE MAIN */
function updateMain(){
  const nft = nfts[selected];
  document.getElementById("mainNFT").src = nft.image;

  const el = document.getElementById("characterCard");

  const get=(t)=>nft.attributes?.find(a=>a.trait_type.toLowerCase()==t)?.value;

  const hp = parseInt(get("hp"))||0;
  const power = parseInt(get("power level"))||0;

  el.innerHTML = `
  <div>${nft.name}</div>

  <div>HP ${hp}</div>
  <div class="stat-bar"><div id="hp" class="stat-fill"></div></div>

  <div>Power ${power}</div>
  <div class="stat-bar"><div id="pw" class="stat-fill"></div></div>
  `;

  setTimeout(()=>{
    document.getElementById("hp").style.width = hp+"%";
    document.getElementById("pw").style.width = power+"%";
  },50);
}

/* OVERLAY */
document.getElementById("photo").onclick=()=>{
  document.getElementById("nftOverlay").style.display="flex";
};

/* DROPDOWN */
const toggle=document.getElementById("cardToggle");
const card=document.getElementById("characterCard");
const icon=document.getElementById("icon");

toggle.onclick=()=>{
  card.classList.toggle("open");
  icon.textContent = card.classList.contains("open")?"▲":"▼";
};

/* SAVE */
document.getElementById("saveBtn").onclick = async ()=>{
  const target=document.getElementById("captureArea");

  const canvas = await html2canvas(target,{
    scale:4,
    useCORS:true
  });

  const link=document.createElement("a");
  link.download="class-photo.png";
  link.href=canvas.toDataURL();
  link.click();
};

/* SCROLL */
const track=document.getElementById("track");
const stage=document.querySelector(".stage");

window.addEventListener("scroll",()=>{
  const s=window.scrollY-stage.offsetTop;
  const p=Math.min(Math.max(s/(stage.scrollHeight-innerHeight),0),1);
  track.style.transform=`translateX(-${p*(track.scrollWidth-innerWidth)}px)`;
});
</script>

</body>
</html>
