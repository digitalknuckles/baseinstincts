<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Naïveté © : Base Instincts</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body { margin:0; background:#000; color:#fff; font-family:Inter; }

.bg {
  position:fixed; inset:0;
  background:url('image.png') center/cover;
}

.header {
  display:flex; justify-content:space-between;
  padding:14px 6vw;
}

.btn {
  background:linear-gradient(90deg,#ff6ad5,#ffd36a);
  padding:8px 12px;
  border-radius:999px;
  color:#000;
  font-weight:600;
}

.blink { animation:blink 1s infinite; }
@keyframes blink { 50% { opacity:0.4 } }

/* overlay */
#overlay {
  position:fixed; inset:0;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.9);
}

#capture {
  width:320px;
  height:320px;
  position:relative;
}

#capture img {
  width:100%;
  height:100%;
  object-fit:cover;
}

#hud {
  position:absolute;
  inset:0;
  background:url('https://ipfs.io/ipfs/bafybeiasnk6fhvqxc4eqnytyp42wsayqe477v7nlz6gipkmnf5ts2kel2q') center/cover;
}

/* dropdown */
#card {
  width:320px;
  margin-top:10px;
  border:1px solid rgba(255,255,255,0.2);
}

#cardContent {
  max-height:0;
  overflow:hidden;
  transition:0.3s;
}

#cardContent.open {
  max-height:500px;
  padding:10px;
}

/* carousel */
#carousel {
  display:flex;
  gap:8px;
  margin-top:10px;
  overflow:auto;
}

#carousel img {
  width:50px;
  opacity:0.6;
}
#carousel img.active {
  opacity:1;
  border:2px solid white;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="header">
  <div>Naïveté</div>
  <div>
    <button id="connect" class="btn blink">Connect</button>
    <button id="photo" class="btn" disabled>Photo</button>
  </div>
</div>

<div id="overlay">
  <div id="capture">
    <img id="mainNFT">
    <div id="hud"></div>
  </div>

  <div id="card">
    <button id="toggle">Stats ▼</button>
    <div id="cardContent"></div>
  </div>

  <div id="carousel"></div>

  <button id="save" class="btn mt-2">Save</button>
</div>

<script type="module">
import { connectWallet, autoReconnect } from './wallet.js';

let nfts=[], selected=0, user;

// AUTO RECONNECT
(async()=>{
  const session = await autoReconnect();
  if(session){
    user=session.address;
    document.getElementById("connect").textContent=user.slice(0,6);
    loadNFTs();
  }
})();

// CONNECT
document.getElementById("connect").onclick=async()=>{
  const res = await connectWallet();
  user = res.address;

  document.getElementById("connect").classList.remove("blink");
  document.getElementById("connect").textContent=user.slice(0,6);

  loadNFTs();
};

// LOAD NFTS
async function loadNFTs(){
  document.getElementById("connect").textContent="Loading...";

  const res = await fetch(`/api/opensea?address=${user}`);
  const data = await res.json();

  nfts=data.nfts||[];

  if(!nfts.length){
    alert("No NFTs");
    return;
  }

  document.getElementById("photo").disabled=false;
  document.getElementById("connect").textContent=user.slice(0,6);

  buildCarousel();
}

// CAROUSEL
function buildCarousel(){
  const el=document.getElementById("carousel");
  el.innerHTML="";

  nfts.forEach((n,i)=>{
    const img=document.createElement("img");
    img.src=n.image;

    if(i===0) img.classList.add("active");

    img.onclick=()=>{
      selected=i;
      update();
      document.querySelectorAll("#carousel img").forEach(x=>x.classList.remove("active"));
      img.classList.add("active");
    };

    el.appendChild(img);
  });

  update();
}

// UPDATE UI
function update(){
  const nft=nfts[selected];
  document.getElementById("mainNFT").src=nft.image;

  const hp = nft.attributes?.find(a=>a.trait_type==="HP")?.value || 0;
  const power = nft.attributes?.find(a=>a.trait_type==="power level")?.value || 0;

  document.getElementById("cardContent").innerHTML = `
    <div>${nft.name}</div>
    <div>HP: ${hp}</div>
    <div>Power: ${power}</div>
  `;
}

// DROPDOWN
document.getElementById("toggle").onclick=()=>{
  document.getElementById("cardContent").classList.toggle("open");
};

// OPEN OVERLAY
document.getElementById("photo").onclick=()=>{
  document.getElementById("overlay").style.display="flex";
};

// SAVE
document.getElementById("save").onclick=async()=>{
  const canvas = await html2canvas(document.getElementById("capture"), {
    scale:4
  });

  const link=document.createElement("a");
  link.download="photo.png";
  link.href=canvas.toDataURL();
  link.click();
};

</script>

</body>
</html>
